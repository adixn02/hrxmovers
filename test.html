<!DOCTYPE html>
<html lang="en">
<head>
    <title>Two Red Down Arrows</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* space between arrows */
            height: 100vh;
            justify-content: center;
        }

        .arrow {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid red; /* Red down arrow */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="arrow"></div>
    <div class="arrow"></div>
</div>

</body>
</html>
